      const clampNumber = (value, min, max) => Math.min(max, Math.max(min, value));
      const parseLocaleNumber = (value) => {
        if (value === "" || value === null || value === undefined) return 0;
        if (typeof value === "number") return value;
        const trimmed = `${value}`.trim().replace(/\s/g, "");
        if (!trimmed) return 0;
        let normalized = trimmed;
        if (trimmed.includes(",")) {
          normalized = trimmed.replace(/\./g, "").replace(/,/g, ".");
        }
        const parsed = Number.parseFloat(normalized);
        return Number.isNaN(parsed) ? 0 : parsed;
      };

      const parseNumber = (value) => {
        if (value === "" || value === null || value === undefined) return 0;
        const parsed = parseLocaleNumber(value);
        return Number.isNaN(parsed) ? 0 : parsed;
      };

        const input = `${rawValue ?? ""}`.trim();
        if (!input) return { empty: true, valid: false, value: 0 };
        const normalized = input.replace(/\s+/g, "").replace(",", ".");
        if (!/^[+-]?\d*(?:\.\d*)?$/.test(normalized)) {
          return { empty: false, valid: false, value: 0 };
        }
        if (["+", "-", ".", "+.", "-."].includes(normalized)) {
          return { empty: false, valid: false, value: 0 };
        }
        const parsed = Number.parseFloat(normalized);
        if (!Number.isFinite(parsed)) {
          return { empty: false, valid: false, value: 0 };
        }
        return { empty: false, valid: true, value: parsed };
      };

          return Number.isFinite(n) ? n : Number.MAX_SAFE_INTEGER;
        });
        const aTokens = tokenize(a);
        const bTokens = tokenize(b);
        const maxLength = Math.max(aTokens.length, bTokens.length);
        for (let index = 0; index < maxLength; index += 1) {
          const aToken = aTokens[index] ?? -1;
          const bToken = bTokens[index] ?? -1;
          if (aToken === bToken) continue;
          return aToken - bToken;
        }
        return `${a || ""}`.localeCompare(`${b || ""}`, "de", { numeric: true });

                .map((child) => ({

                  type: "subtask",
                  pm: child.pm,

      };

      const parseMonthYear = (value) => {
        if (!value) return null;
        const [monthPart, yearPart] = `${value}`.trim().split(".");
        const month = Number.parseInt(monthPart, 10);
        const year = Number.parseInt(yearPart, 10);
        if (!Number.isFinite(month) || !Number.isFinite(year)) return null;
        if (month < 1 || month > 12) return null;
        return { year, month: month - 1 };
      };

      const parseDisplayDateToDate = (value) => {
        if (!value) return null;
        const input = `${value}`.trim();
        if (!input) return null;
        const deDate = input.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
        if (deDate) {
          const day = Number.parseInt(deDate[1], 10);
          const month = Number.parseInt(deDate[2], 10);
          const year = Number.parseInt(deDate[3], 10);
          const parsed = new Date(year, month - 1, day);
          if (
            parsed.getFullYear() === year
            && parsed.getMonth() === month - 1
            && parsed.getDate() === day
          ) {
            return parsed;
          }
          return null;
        }
        const iso = input.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
        if (iso) {
          const year = Number.parseInt(iso[1], 10);
          const month = Number.parseInt(iso[2], 10);
          const day = Number.parseInt(iso[3], 10);
          const parsed = new Date(year, month - 1, day);
          if (
            parsed.getFullYear() === year
            && parsed.getMonth() === month - 1
            && parsed.getDate() === day
          ) {
            return parsed;
          }
          return null;
        }
        return null;

        if (!parsedEntry) return new Date(parsedProjectStart.getFullYear(), parsedProjectStart.getMonth(), 1);
        const entryMonthStart = new Date(parsedEntry.getFullYear(), parsedEntry.getMonth(), 1);
        const projectMonthStart = new Date(parsedProjectStart.getFullYear(), parsedProjectStart.getMonth(), 1);
        return entryMonthStart > projectMonthStart ? entryMonthStart : projectMonthStart;

        projectEnd,
        employeeEntryDate,

        const projectStartIndex = toAbsoluteMonthIndex(projectStart);
        const projectEndIndex = toAbsoluteMonthIndex(projectEnd);
        if (!Number.isFinite(projectStartIndex) || !Number.isFinite(projectEndIndex) || projectEndIndex < projectStartIndex) {

        const employeeAvailableFrom = getEmployeeAvailableFrom(
          new Date(Math.floor(projectStartIndex / 12), projectStartIndex % 12, 1),
          employeeEntryDate
        );
        const employeeStartIndex = employeeAvailableFrom.getFullYear() * 12 + employeeAvailableFrom.getMonth();
        const effectiveStart = Math.max(projectStartIndex, employeeStartIndex);
        const yearStart = year * 12;
        const yearEnd = yearStart + 11;
        const overlapStart = Math.max(effectiveStart, yearStart);
        const overlapEnd = Math.min(projectEndIndex, yearEnd);
        if (overlapEnd < overlapStart) return 0;
        return overlapEnd - overlapStart + 1;

        };
        next.companyHistoryByCompany = Array.isArray(parsed?.companyHistoryByCompany)
          ? parsed.companyHistoryByCompany.map((entry, companyIndex) => {
              const fallback = createHistoryState(next.companyData[companyIndex]?.tabellenEintraege || {});
              if (!entry || typeof entry !== "object") return fallback;

        return {

      const formatMonthYearFromAbsoluteIndex = (absoluteMonthIndex) => {
        const year = Math.floor(absoluteMonthIndex / 12);
        const month = (absoluteMonthIndex % 12) + 1;
        return `${String(month).padStart(2, "0")}.${year}`;
      };

      const getMonthsByYearFromRange = (startAbsoluteIndex, endAbsoluteIndex) => {
        const monthsByYear = {};
        for (let index = startAbsoluteIndex; index <= endAbsoluteIndex; index += 1) {
          const year = Math.floor(index / 12);
          monthsByYear[year] = (monthsByYear[year] || 0) + 1;
        }
        return monthsByYear;
      };

      const toAbsoluteMonthIndex = (value) => {
        if (typeof value === "number" && Number.isFinite(value)) {
          return Math.floor(value);
        }
        if (value instanceof Date) {
          return value.getFullYear() * 12 + value.getMonth();
        }
        return null;
      };

      const getProjectMonthsInYear = (projectStart, projectEnd, year) => {
        const startIndex = toAbsoluteMonthIndex(projectStart);
        const endIndex = toAbsoluteMonthIndex(projectEnd);
        if (!Number.isFinite(startIndex) || !Number.isFinite(endIndex) || endIndex < startIndex) return 0;
        const yearStart = year * 12;
        const yearEnd = yearStart + 11;
        const overlapStart = Math.max(startIndex, yearStart);
        const overlapEnd = Math.min(endIndex, yearEnd);
        if (overlapEnd < overlapStart) return 0;
        return overlapEnd - overlapStart + 1;
      };

      const getEmployeeAllowedPMInYear = (employee, projectRange, employeeEntryDate, year) => {
        if (!employee) return 0;
        const projectPercent = getEffectiveProjectPercent(employee.projectPercent);
        const allowedPMFullYear = YEAR_CAP_PM * (projectPercent / 100);
        const availableMonthsInYear = getEmployeeAvailableMonthsInYear(
          projectRange?.start,
          projectRange?.end,
          employeeEntryDate || employee.projectEntryDate,
          year
        );
        return allowedPMFullYear * (availableMonthsInYear / 12);
      };

      const getAssignedPMInYear = (companyId, employeeId, year, assignments) => {
        if (!assignments || !Number.isFinite(employeeId)) return 0;
        return Object.values(assignments).reduce((sum, assignment) => {
          if (!assignment || assignment.employeeIndex !== employeeId) return sum;
          return sum + (assignment.pmByYear?.[year] || 0);
        }, 0);
      };

      const canAssignWorkPackageToEmployee = (
        companyId,
        employeeId,
        workPackage,
        start,
        end,
        assignments,
        employees,
        projectRange
      ) => {
        if (!workPackage || !employees?.[employeeId]) return false;
        if (!Number.isFinite(start) || !Number.isFinite(end) || end < start) return false;
        const employeeAvailableFrom = getEmployeeAvailableFrom(
          new Date(Math.floor(projectRange.start / 12), projectRange.start % 12, 1),
          employees[employeeId]?.projectEntryDate
        );
        const employeeStartIndex = employeeAvailableFrom.getFullYear() * 12 + employeeAvailableFrom.getMonth();
        if (start < employeeStartIndex) return false;
        const durationMonths = end - start + 1;
        if (durationMonths <= 0) return false;
        const pmPerMonth = workPackage.pmDemand / durationMonths;
        const monthsByYear = getMonthsByYearFromRange(start, end);
        return Object.entries(monthsByYear).every(([yearKey, months]) => {
          const year = Number.parseInt(yearKey, 10);
          const pmInYear = pmPerMonth * months;
          const existingRowAssignment = assignments?.[workPackage.id];
          const alreadyReservedForRow =
            existingRowAssignment && existingRowAssignment.employeeIndex === employeeId
              ? existingRowAssignment.pmByYear?.[year] || 0
              : 0;
          const assignedPMSoFar =
            getAssignedPMInYear(companyId, employeeId, year, assignments) - alreadyReservedForRow;
          const allowedPMInYear = getEmployeeAllowedPMInYear(
            employees[employeeId],
            projectRange,
            employees[employeeId]?.projectEntryDate,
            year
          );
          return assignedPMSoFar + pmInYear <= allowedPMInYear + PM_EPSILON;
        });
      };

        const importProjectDatabase = useCallback((backupJson, mode) => {
          if (!validateProjectBackup(backupJson)) {
            throw new Error("invalid_backup");
          }
          const nowIso = new Date().toISOString();
          const normalizedProjects = backupJson.projects.map((project, index) => {
            const fallbackName = `${project.projectName || project.projectId || `Projekt_${index + 1}`}`.trim() || `Projekt_${index + 1}`;
            const state = sanitizeProjectState(migrateProjectState(project.state));
            return {
              projectId: `${project.projectId || fallbackName}`.trim() || fallbackName,
              projectName: fallbackName,
              createdAt: project.createdAt || nowIso,
              lastModified: project.lastModified || nowIso,
              state,
            };
          });

          if (mode === "replace") {
            projectRecords.forEach((record) => {
              localStorage.removeItem(getProjectStorageKey(record.name));
            });
          }

          const existingNames = mode === "replace" ? [] : projectRecords.map((record) => record.name);
          const usedNamesLowerCase = new Set(existingNames.map((name) => name.toLowerCase()));
          const usedProjectIds = new Set(mode === "replace" ? [] : projectRecords.map((record) => record.name));

          normalizedProjects.forEach((project) => {
            let targetProjectId = project.projectId;
            let targetProjectName = project.projectName;
            const idConflict = usedProjectIds.has(targetProjectId);
            const nameConflict = usedNamesLowerCase.has(targetProjectName.toLowerCase());
            if (mode === "merge" && (idConflict || nameConflict)) {
              targetProjectName = buildUniqueImportedProjectName(targetProjectName, usedNamesLowerCase);
              targetProjectId = targetProjectName;
            } else {
              usedNamesLowerCase.add(targetProjectName.toLowerCase());
            }
            usedProjectIds.add(targetProjectId);
            persistProject(targetProjectName, project.state, {
              createdAt: project.createdAt,
              lastModified: project.lastModified,
            });

          const refreshedRaw = localStorage.getItem(PROJECTS_INDEX_KEY);
          const refreshedIndex = refreshedRaw ? JSON.parse(refreshedRaw) : [];

                return entry;
              }
              const rows = filteredWorkPackageRowsByCompany[companyIndex] || [];
              const existingEntries = entry.tabellenEintraege || {};
              const updatedEntries = rows.reduce((acc, row) => {
                const currentEntry = existingEntries[row.id] || {};
                acc[row.id] = currentEntry;
                return acc;
              }, {});

              if (!areTableEntriesEqual(existingEntries, updatedEntries)) {
                hasChanges = true;
                return { ...entry, tabellenEintraege: updatedEntries };
              }
              return entry;
            });
            if (hasChanges) {
              setCompanyHistoryByCompany((prevHistory) => {
                const nextHistory = [...prevHistory];
                next.forEach((entry, companyIndex) => {
                  if (!activeCompanyIndexes.includes(companyIndex)) return;
                  const existing = prevHistory[companyIndex] || createHistoryState({});
                  const existingSnapshot = normalizeCompanyHistorySnapshot(
                    existing.history[existing.historyIndex] || {}
                  );
                  if (
                    areTableEntriesEqual(
                      existingSnapshot.tabellenEintraege || {},
                      entry.tabellenEintraege || {}
                    )
                  ) {
                    return;
                  }
                  nextHistory[companyIndex] = createHistoryState(entry.tabellenEintraege || {});
                });
                return nextHistory;
              });
            }
            return hasChanges ? next : prev;
          });
        }, [filteredWorkPackageRowsByCompany, activeCompanyIndexes]);

        const updateWpTitle = (wpIndex, value) => {
          setWorkPackages((prev) => {
            const next = [...prev];
            next[wpIndex] = { ...next[wpIndex], title: value };
            return next;
          });
        };

        const updateSubTitle = (wpIndex, subIndex, value) => {
          setWorkPackages((prev) => {
            const next = [...prev];
            const wp = { ...next[wpIndex] };
            const sub = [...wp.sub];
            sub[subIndex] = { ...sub[subIndex], title: value };
            wp.sub = sub;
            next[wpIndex] = wp;
            return next;
          });
        };

        const updatePm = (wpIndex, subIndex, companyIndex, value) => {
          if (subIndex === null) return;
          setWorkPackages((prev) => {
            const next = [...prev];
            const wp = { ...next[wpIndex] };
            const sub = [...wp.sub];
            const subItem = { ...sub[subIndex] };
            const pm = [...subItem.pm];
            pm[companyIndex] = value;
            subItem.pm = pm;
            sub[subIndex] = subItem;
            wp.sub = sub;
            next[wpIndex] = wp;
            return next;
          });
        };

        const buildPmDraftKey = (wpIndex, subIndex, companyIndex) =>
          `${wpIndex}-${subIndex}-${companyIndex}`;

        const handlePmDraftChange = (wpIndex, subIndex, companyIndex, value) => {
          if (subIndex === null) return;
          const key = buildPmDraftKey(wpIndex, subIndex, companyIndex);
          setPmInputDrafts((prev) => ({
            ...prev,
            [key]: value,
          }));
        };

        const commitPmDraft = (wpIndex, subIndex, companyIndex) => {
          if (subIndex === null) return;
          const key = buildPmDraftKey(wpIndex, subIndex, companyIndex);
          const fallbackValue = workPackages?.[wpIndex]?.sub?.[subIndex]?.pm?.[companyIndex] ?? "";
          const rawValue = Object.prototype.hasOwnProperty.call(pmInputDrafts, key)
            ? pmInputDrafts[key]
            : `${fallbackValue ?? ""}`;
          const parsed = parsePmTextValue(rawValue);

          if (parsed.empty) {
            updatePm(wpIndex, subIndex, companyIndex, "");
            setPmInputDrafts((prev) => {
              const next = { ...prev };
              delete next[key];
              return next;
            });
            return;
          }

          if (!parsed.valid) {
            setPmInputDrafts((prev) => {
              const next = { ...prev };
              next[key] = formatPmDisplay(fallbackValue);
              return next;
            });
            return;
          }

          const clamped = Math.max(0, parsed.value);
          const rounded = roundToTwo(roundPmToQuarterStep(clamped));
          const wasRounded = Math.abs(clamped - rounded) > PM_EPSILON;

          updatePm(wpIndex, subIndex, companyIndex, rounded);
          setPmInputDrafts((prev) => {
            const next = { ...prev };
            delete next[key];
            return next;
          });
          if (wasRounded) {
            setPmInputHint({ key, message: "auf 0,25 gerundet" });
          }
        };

        const addWp = () => {
          setWorkPackages((prev) => {
            if (prev.length >= MAX_WP) return prev;
            return [...prev, createWp(prev.length)];
          });
        };

        const addSub = (wpIndex) => {
          setWorkPackages((prev) => {
            const next = [...prev];
            const wp = { ...next[wpIndex] };
            if (wp.sub.length >= MAX_SUB) return prev;
            wp.sub = [...wp.sub, createSub(wpIndex, wp.sub.length)];
            next[wpIndex] = wp;
            return next;
          });
        };

        const requestDelete = (type, wpIndex, subIndex = null) => {
          setPendingDelete({ type, wpIndex, subIndex });
        };

        const cancelDelete = () => setPendingDelete(null);

        const confirmDelete = () => {
          if (!pendingDelete) return;
          const { type, wpIndex, subIndex } = pendingDelete;
          setWorkPackages((prev) => {
            const next = [...prev];
            if (type === "wp") {
              next.splice(wpIndex, 1);
            } else if (type === "sub") {
              const wp = { ...next[wpIndex] };
              const sub = [...wp.sub];
              sub.splice(subIndex, 1);
              wp.sub = sub;
              next[wpIndex] = wp;
            }
            return next.length ? next : createDefaultWorkPackages();
          });
          setPendingDelete(null);
        };

        const addEmployee = (companyIndex) => {
          setEmployeesByCompany((prev) => {
            const next = [...prev];
            const companyEmployees = [...(next[companyIndex] || [])];
            if (companyEmployees.length >= MAX_EMPLOYEES) return prev;
            companyEmployees.push(createEmployee());
            next[companyIndex] = companyEmployees;
            return next;
          });
        };

        const requestEmployeeRemove = (companyIndex) => {
          const companyEmployees = employeesByCompany[companyIndex] || [];
          if (!companyEmployees.length) return;
          setPendingEmployeeDelete(companyIndex);
        };

        const cancelEmployeeRemove = () => setPendingEmployeeDelete(null);

        const confirmEmployeeRemove = () => {
          if (pendingEmployeeDelete === null) return;
          setEmployeesByCompany((prev) => {
            const next = [...prev];
            const companyEmployees = [...(next[pendingEmployeeDelete] || [])];
            companyEmployees.pop();
            next[pendingEmployeeDelete] = companyEmployees.length
              ? companyEmployees
              : [createEmployee()];
            return next;
          });
          setPendingEmployeeDelete(null);
        };

        const updateEmployeeField = (companyIndex, employeeIndex, field, value) => {
          setEmployeesByCompany((prev) => {
            const next = [...prev];
            const companyEmployees = [...(next[companyIndex] || [])];
            companyEmployees[employeeIndex] = {
              ...companyEmployees[employeeIndex],
              [field]: value,
            };
            next[companyIndex] = companyEmployees;
            return next;
          });
        };

        const updateEmployeeNumber = (
          companyIndex,
          employeeIndex,
          field,
          value,
          min,
          max = null
        ) => {
          const numeric = parseNumber(value);
          const clamped = max === null ? Math.max(min, numeric) : clampNumber(numeric, min, max);
          updateEmployeeField(companyIndex, employeeIndex, field, clamped);
        };

        const getPmDemandForCompanyRow = (companyIndex, rowId) => {
          const rowsForCompany = filteredWorkPackageRowsByCompany[companyIndex] || [];
          const row = rowsForCompany.find((item) => item.id === rowId);
          return normalizePmValue(row?.pmByCompany?.[companyIndex]);
        };

        const setCompanyInlineWarning = (companyIndex, message) => {
          if (!message) return;
          setAssignmentWarningsByCompany((prev) => ({
            ...prev,
            [companyIndex]: message,
          }));
          window.setTimeout(() => {
            setAssignmentWarningsByCompany((prev) => {
              if (prev[companyIndex] !== message) return prev;
              const next = { ...prev };
              delete next[companyIndex];
              return next;
            });
          }, 4000);
        };

        const updateCompanyTableEntry = (companyIndex, rowId, field, value, options = {}) => {
          const commitHistory = options.commitHistory !== false;
          let beforeSnapshot = null;
          let afterSnapshot = null;
          let hasChanged = false;

          setCompanyData((prev) => {
            const next = [...prev];
            const companyEntry = { ...next[companyIndex] };
            const tabellenEintraege = { ...companyEntry.tabellenEintraege };
            const currentRowEntry = { ...(tabellenEintraege[rowId] || {}) };
            const nextRowEntry = { ...currentRowEntry };
            const pmDemand = getPmDemandForCompanyRow(companyIndex, rowId);

            if (field === "start") {
              nextRowEntry.start = value;
              const startMonth = parseMonthYear(value);
              if (startMonth) {
                const startDateValue = new Date(startMonth.year, startMonth.month, 1);
                const currentEndMonth = parseMonthYear(currentRowEntry.ende);
                const minimumEndDate = getMinimumValidEndDate(startDateValue, pmDemand || 0);
                const minimumEndIndex = minimumEndDate.getFullYear() * 12 + minimumEndDate.getMonth();
                const currentEndIndex = currentEndMonth ? currentEndMonth.year * 12 + currentEndMonth.month : null;
                const existingDurationMonths =
                  currentEndIndex !== null
                    ? currentEndIndex - (startMonth.year * 12 + startMonth.month) + 1
                    : null;
                if (existingDurationMonths && existingDurationMonths >= Math.max(1, Math.ceil(pmDemand || 0))) {
                  const adjustedEnd = new Date(startDateValue.getFullYear(), startDateValue.getMonth() + existingDurationMonths, 0);
                  nextRowEntry.ende = formatMonthYearFromAbsoluteIndex(
                    adjustedEnd.getFullYear() * 12 + adjustedEnd.getMonth()
                  );
                } else {
                  nextRowEntry.ende = formatMonthYearFromAbsoluteIndex(minimumEndIndex);
                }
              }
            } else if (field === "ende") {
              nextRowEntry.ende = value;
              const startMonth = parseMonthYear(currentRowEntry.start);
              const endMonth = parseMonthYear(value);
              if (startMonth && endMonth) {
                const startDateValue = new Date(startMonth.year, startMonth.month, 1);
                const minimumEndDate = getMinimumValidEndDate(startDateValue, pmDemand || 0);
                const minimumEndIndex = minimumEndDate.getFullYear() * 12 + minimumEndDate.getMonth();
                const enteredEndIndex = endMonth.year * 12 + endMonth.month;
                if (enteredEndIndex < minimumEndIndex) {
                  nextRowEntry.ende = formatMonthYearFromAbsoluteIndex(minimumEndIndex);
                  setCompanyInlineWarning(
                    companyIndex,
                    "Der Zeitraum ist zu kurz für die zugeordneten Personenmonate. Das Enddatum wurde automatisch angepasst."
                  );
                }
              }
            } else {
              nextRowEntry[field] = value;
            }

            if (JSON.stringify(currentRowEntry) === JSON.stringify(nextRowEntry)) return prev;
            beforeSnapshot = createCompanyHistorySnapshot(tabellenEintraege);
            tabellenEintraege[rowId] = nextRowEntry;
            companyEntry.tabellenEintraege = tabellenEintraege;
            next[companyIndex] = companyEntry;
            afterSnapshot = createCompanyHistorySnapshot(tabellenEintraege);
            hasChanged = true;
            return next;
          });

          if (commitHistory && hasChanged && beforeSnapshot && afterSnapshot) {
            commitCompanyHistoryStep(companyIndex, beforeSnapshot, afterSnapshot);
          }
        };

        const getCompanyPmSnapshot = (companyIndex, sourceWorkPackages = workPackages) => {
          const pmByRowId = {};
          sourceWorkPackages.forEach((wp) => {
            pmByRowId[wp.id] = wp.pm?.[companyIndex] ?? "";
            wp.sub.forEach((sub) => {
              pmByRowId[sub.id] = sub.pm?.[companyIndex] ?? "";
            });
          });
          return { pmByRowId };
        };

        const applyCompanyPmSnapshot = (companyIndex, pmSnapshot) => {
          if (!pmSnapshot?.pmByRowId) return;
          const pmByRowId = pmSnapshot.pmByRowId;
          setWorkPackages((prev) =>
            prev.map((wp) => {
              const nextWpPm = [...wp.pm];
              if (Object.prototype.hasOwnProperty.call(pmByRowId, wp.id)) {
                nextWpPm[companyIndex] = pmByRowId[wp.id];
              }
              return {
                ...wp,
                pm: nextWpPm,
                sub: wp.sub.map((sub) => {
                  const nextSubPm = [...sub.pm];
                  if (Object.prototype.hasOwnProperty.call(pmByRowId, sub.id)) {
                    nextSubPm[companyIndex] = pmByRowId[sub.id];
                  }
                  return {
                    ...sub,
                    pm: nextSubPm,
                  };
                }),
              };
            })
          );
        };

        const applyCompanySnapshot = (companyIndex, snapshot) => {
          const normalizedSnapshot = normalizeCompanyHistorySnapshot(snapshot);
          setCompanyData((prev) => {
            const next = [...prev];
            next[companyIndex] = {
              ...next[companyIndex],
              tabellenEintraege: cloneTableEntries(normalizedSnapshot.tabellenEintraege),
            };
            return next;
          });
          applyCompanyPmSnapshot(companyIndex, normalizedSnapshot.pmSnapshot);
        };

        const commitCompanyHistoryStep = (companyIndex, beforeSnapshot, afterSnapshot) => {
          setCompanyHistoryByCompany((prevHistory) => {
            const nextHistory = [...prevHistory];
            const current = nextHistory[companyIndex] || createHistoryState({});
            const trimmedHistory = current.history.slice(0, current.historyIndex + 1);
            if (trimmedHistory.length) {
              trimmedHistory[trimmedHistory.length - 1] = normalizeCompanyHistorySnapshot(
                beforeSnapshot
              );
            } else {
              trimmedHistory.push(normalizeCompanyHistorySnapshot(beforeSnapshot));
            }
            trimmedHistory.push(normalizeCompanyHistorySnapshot(afterSnapshot));
            let history = trimmedHistory;
            if (history.length > MAX_HISTORY_STEPS) {
              history = history.slice(history.length - MAX_HISTORY_STEPS);
            }
            nextHistory[companyIndex] = {
              history,
              historyIndex: history.length - 1,
            };
            return nextHistory;
          });
        };

        const undoCompanyAssignment = (companyIndex) => {
          let snapshotToApply = null;
          setCompanyHistoryByCompany((prev) => {
            const next = [...prev];
            const companyHistory = next[companyIndex];
            if (!companyHistory || companyHistory.historyIndex <= 0) return prev;
            const historyIndex = companyHistory.historyIndex - 1;
            snapshotToApply = normalizeCompanyHistorySnapshot(companyHistory.history[historyIndex]);
            next[companyIndex] = {
              ...companyHistory,
              historyIndex,
            };
            return next;
          });
          if (snapshotToApply) {
            applyCompanySnapshot(companyIndex, snapshotToApply);
          }
        };

        const redoCompanyAssignment = (companyIndex) => {
          let snapshotToApply = null;
          setCompanyHistoryByCompany((prev) => {
            const next = [...prev];
            const companyHistory = next[companyIndex];
            if (
              !companyHistory ||
              companyHistory.historyIndex >= companyHistory.history.length - 1
            ) {
              return prev;
            }
            const historyIndex = companyHistory.historyIndex + 1;
            snapshotToApply = normalizeCompanyHistorySnapshot(companyHistory.history[historyIndex]);
            next[companyIndex] = {
              ...companyHistory,
              historyIndex,
            };
            return next;
          });
          if (snapshotToApply) {
            applyCompanySnapshot(companyIndex, snapshotToApply);
          }
        };

        const getAutoPlanningLocks = (companyIndex) => ({
          ...DEFAULT_AUTO_LOCKS,
          ...(companyData[companyIndex]?.autoPlanningLocks || {}),
        });

        const runAutoProjectPlanning = (companyIndex) => {
          console.log("Auto-Projektplanung gestartet");
          const companyRows = filteredWorkPackageRowsByCompany[companyIndex] || [];
          const companyEmployees = employeesByCompany[companyIndex] || [];
          const locks = getAutoPlanningLocks(companyIndex);
          const shouldOptimizeEmployees = !locks.employeeAssignment;
          const shouldOptimizeDates = !locks.workPackageDates;
          const shouldOptimizePm = !locks.personMonths;
          if (!companyRows.length) return;
          if (!shouldOptimizeEmployees && !shouldOptimizeDates && !shouldOptimizePm) return;
          if (shouldOptimizeEmployees && !companyEmployees.length) return;

          const projectStart = parseDate(startDate);
          const projectStartIndex = projectStart.getFullYear() * 12 + projectStart.getMonth();
          const projectEndIndex = projectStartIndex + durationMonths - 1;
          if (projectEndIndex < projectStartIndex) return;

          const rowsToPlan = [...companyRows].sort((a, b) => {
            return `${a.number}`.localeCompare(`${b.number}`, "de", { numeric: true });
          });
          const rowsWithPm = rowsToPlan
            .map((row) => ({
              row,
              pmDemand: normalizePmValue(row.pmByCompany?.[companyIndex]),
            }))
            .filter((entry) => entry.pmDemand > 0);
          if (!rowsWithPm.length) return;

          const existingEntries = companyData[companyIndex]?.tabellenEintraege || {};
          const resetEntries = cloneTableEntries(existingEntries);
          companyRows.forEach((row) => {
            const currentEntry = resetEntries[row.id] || {};
            resetEntries[row.id] = {
              ...currentEntry,
              start: shouldOptimizeDates ? "" : currentEntry.start || "",
              ende: shouldOptimizeDates ? "" : currentEntry.ende || "",
              mitarbeiterNummer: shouldOptimizeEmployees ? "" : currentEntry.mitarbeiterNummer || "",
              notPlannable: shouldOptimizeEmployees ? false : !!currentEntry.notPlannable,
            };
          });
          const plannedByRowId = {};
          if (shouldOptimizeDates) {
            const rowCount = rowsWithPm.length;
            const timelineLength = projectEndIndex - projectStartIndex + 1;
            const durations = rowsWithPm.map((entry) =>
              clampNumber(Math.ceil(entry.pmDemand), 1, timelineLength)
            );
            const lastDuration = durations[rowCount - 1] || 1;
            const lastRowStart = Math.max(projectStartIndex, projectEndIndex - lastDuration + 1);
            let previousStart = projectStartIndex;

            rowsWithPm.forEach((entry, index) => {
              const duration = durations[index];
              const latestStart = Math.max(projectStartIndex, projectEndIndex - duration + 1);
              const baseStart =
                rowCount === 1
                  ? projectStartIndex
                  : Math.round(
                      projectStartIndex +
                        ((lastRowStart - projectStartIndex) * index) / (rowCount - 1)
                    );

              let start = clampNumber(
                Math.max(baseStart, previousStart),
                projectStartIndex,
                latestStart
              );
              if (index === 0) {
                start = projectStartIndex;
              }

              const end = clampNumber(start + duration - 1, start, projectEndIndex);
              previousStart = start;
              plannedByRowId[entry.row.id] = {
                start: formatMonthYearFromAbsoluteIndex(start),
                ende: formatMonthYearFromAbsoluteIndex(end),
              };
            });
          } else {
            rowsWithPm.forEach((entry) => {
              const current = resetEntries[entry.row.id] || {};
              plannedByRowId[entry.row.id] = {
                start: current.start || "",
                ende: current.ende || "",
              };
            });
          }

          const employeeOrder = companyEmployees
            .map((employee, employeeIndex) => ({
              employeeIndex,
              annualSalary: parseNumber(employee.annualSalary),
            }))
            .sort((a, b) => b.annualSalary - a.annualSalary || a.employeeIndex - b.employeeIndex);

          const zuschlagInput = parseNumber(companyData[companyIndex]?.zuschlagsfaktorPercent);
          const maximalbetrag = parseNumber(companyData[companyIndex]?.maximalbetrag);
          const personnelCostTarget =
            1 + zuschlagInput / 100 > 0
              ? maximalbetrag / (1 + zuschlagInput / 100)
              : Number.POSITIVE_INFINITY;

          const projectRange = { start: projectStartIndex, end: projectEndIndex };
          const assignments = {};
          const rowPlanningData = {};
          const unplannableRowIds = [];
          let plannedPersonnelCosts = 0;

          const getStartEndMonthIndex = (assignment) => {
            const parsedStart = parseMonthYear(assignment.start);
            const parsedEnd = parseMonthYear(assignment.ende);
            if (!parsedStart || !parsedEnd) return null;
            const start = parsedStart.year * 12 + parsedStart.month;
            const end = parsedEnd.year * 12 + parsedEnd.month;
            if (end < start) return null;
            return { start, end };
          };

          rowsWithPm.forEach(({ row, pmDemand }) => {
            const dateAssignment = plannedByRowId[row.id] || {};
            const existingRowEntry = resetEntries[row.id] || {};
            assignments[row.id] = {
              ...dateAssignment,
              mitarbeiterNummer: shouldOptimizeEmployees
                ? ""
                : existingRowEntry.mitarbeiterNummer || "",
            };

            const span = getStartEndMonthIndex(dateAssignment);
            if (!span) {
              unplannableRowIds.push(row.id);
              return;
            }

            const durationMonths = Math.max(1, span.end - span.start + 1);
            const pmPerMonth = pmDemand / durationMonths;
            const monthsByYear = getMonthsByYearFromRange(span.start, span.end);
            const pmByYear = Object.entries(monthsByYear).reduce((acc, [year, months]) => {
              acc[year] = pmPerMonth * months;
              return acc;
            }, {});

            rowPlanningData[row.id] = {
              pmDemand,
              pmByYear,
              start: span.start,
              end: span.end,
            };

            if (!shouldOptimizeEmployees) return;

            const selectedCandidate = [...employeeOrder]
              .sort((a, b) => a.annualSalary - b.annualSalary || a.employeeIndex - b.employeeIndex)
              .find((candidate) =>
                canAssignWorkPackageToEmployee(
                  companyIndex,
                  candidate.employeeIndex,
                  { id: row.id, pmDemand },
                  span.start,
                  span.end,
                  assignments,
                  companyEmployees,
                  projectRange
                )
              );

            if (!selectedCandidate) {
              unplannableRowIds.push(row.id);
              return;
            }

            assignments[row.id] = {
              ...assignments[row.id],
              mitarbeiterNummer: `${selectedCandidate.employeeIndex + 1}`,
            };
            assignments[row.id].employeeIndex = selectedCandidate.employeeIndex;
            assignments[row.id].pmByYear = pmByYear;
            plannedPersonnelCosts += pmDemand * (selectedCandidate.annualSalary / 12);
          });

          if (shouldOptimizeEmployees) {
            let improved = true;
            while (improved) {
              improved = false;
              let bestUpgrade = null;

              Object.entries(assignments).forEach(([rowId, assignment]) => {
                const rowData = rowPlanningData[rowId];
                const currentEmployeeNumber = parseInt(assignment.mitarbeiterNummer, 10);
                if (!rowData || !currentEmployeeNumber) return;
                const currentEmployeeIndex = currentEmployeeNumber - 1;
                const currentEmployee = employeeOrder.find(
                  (employee) => employee.employeeIndex === currentEmployeeIndex
                );
                if (!currentEmployee) return;

                employeeOrder
                  .filter((candidate) => candidate.annualSalary > currentEmployee.annualSalary)
                  .forEach((candidate) => {
                    const candidateAssignments = Object.fromEntries(
                      Object.entries(assignments).map(([id, value]) => [id, { ...value }])
                    );
                    candidateAssignments[rowId] = {
                      ...candidateAssignments[rowId],
                      mitarbeiterNummer: `${candidate.employeeIndex + 1}`,
                      employeeIndex: candidate.employeeIndex,
                      pmByYear: rowData.pmByYear,
                    };
                    const canUseCandidate = canAssignWorkPackageToEmployee(
                      companyIndex,
                      candidate.employeeIndex,
                      { id: rowId, pmDemand: rowData.pmDemand },
                      rowData.start,
                      rowData.end,
                      candidateAssignments,
                      companyEmployees,
                      projectRange
                    );
                    if (!canUseCandidate) return;

                    const oldCost = rowData.pmDemand * (currentEmployee.annualSalary / 12);
                    const newCost = rowData.pmDemand * (candidate.annualSalary / 12);
                    const nextCost = plannedPersonnelCosts - oldCost + newCost;

                    const currentDistance = Math.abs(plannedPersonnelCosts - personnelCostTarget);
                    const nextDistance = Math.abs(nextCost - personnelCostTarget);
                    const improvesDistance =
                      nextDistance < currentDistance - 1e-9 ||
                      (Math.abs(nextDistance - currentDistance) <= 1e-9 &&
                        plannedPersonnelCosts <= personnelCostTarget &&
                        nextCost <= personnelCostTarget &&
                        nextCost > plannedPersonnelCosts + 1e-9);
                    if (!improvesDistance) return;

                    const candidateUpgrade = {
                      rowId,
                      currentEmployeeIndex,
                      targetEmployeeIndex: candidate.employeeIndex,
                      nextDistance,
                      nextCost,
                      costDelta: newCost - oldCost,
                    };

                    if (!bestUpgrade) {
                      bestUpgrade = candidateUpgrade;
                      return;
                    }
                    if (candidateUpgrade.nextDistance < bestUpgrade.nextDistance - 1e-9) {
                      bestUpgrade = candidateUpgrade;
                      return;
                    }
                    if (
                      Math.abs(candidateUpgrade.nextDistance - bestUpgrade.nextDistance) <= 1e-9 &&
                      candidateUpgrade.nextCost <= personnelCostTarget &&
                      bestUpgrade.nextCost > personnelCostTarget
                    ) {
                      bestUpgrade = candidateUpgrade;
                      return;
                    }
                    if (
                      Math.abs(candidateUpgrade.nextDistance - bestUpgrade.nextDistance) <= 1e-9 &&
                      Math.abs(candidateUpgrade.costDelta) < Math.abs(bestUpgrade.costDelta)
                    ) {
                      bestUpgrade = candidateUpgrade;
                    }
                  });
              });

              if (bestUpgrade) {
                const rowData = rowPlanningData[bestUpgrade.rowId];
                assignments[bestUpgrade.rowId] = {
                  ...assignments[bestUpgrade.rowId],
                  mitarbeiterNummer: `${bestUpgrade.targetEmployeeIndex + 1}`,
                  employeeIndex: bestUpgrade.targetEmployeeIndex,
                  pmByYear: rowData.pmByYear,
                };
                plannedPersonnelCosts = bestUpgrade.nextCost;
                improved = true;
              }
            }
          }

          const nextEntries = cloneTableEntries(resetEntries);
          Object.entries(assignments).forEach(([rowId, assignment]) => {
            const { employeeIndex, pmByYear, ...entryFields } = assignment;
            const hasEmployee = parseInt(entryFields.mitarbeiterNummer, 10) > 0;
            nextEntries[rowId] = {
              ...(nextEntries[rowId] || {}),
              ...entryFields,
              notPlannable: !hasEmployee,
            };
          });

          const beforeSnapshot = createCompanyHistorySnapshot(

          const optimizedWorkPackages = shouldOptimizePm
            ? optimizePmWorkPackages(companyIndex, workPackages)
            : workPackages;
          if (unplannableRowIds.length) {
            console.warn(
              `[Auto Planung] Unternehmen ${companyIndex + 1}: ${unplannableRowIds.length} Arbeitspaket(e) nicht planbar ohne Überkapazität.`
            );
          }

          const afterSnapshot = createCompanyHistorySnapshot(
            nextEntries,
            getCompanyPmSnapshot(companyIndex, optimizedWorkPackages)
          );

          applyCompanySnapshot(companyIndex, afterSnapshot);
          commitCompanyHistoryStep(companyIndex, beforeSnapshot, afterSnapshot);
          console.log("Auto-Projektplanung abgeschlossen");

        const calculateCompanyFundingMetrics = (companyIndex, sourceWorkPackages) => {
          const companyEmployees = employeesByCompany[companyIndex] || [];
          const tabellenEintraege = companyData[companyIndex]?.tabellenEintraege || {};
          const pmTotals = companyEmployees.map(() => 0);

          sourceWorkPackages.forEach((wp) => {
            wp.sub.forEach((sub) => {
              const pmDemand = normalizePmValue(sub.pm?.[companyIndex]);
              if (pmDemand <= 0) return;
              const entry = tabellenEintraege[sub.id] || {};
              const employeeNumber = parseInt(entry.mitarbeiterNummer, 10);
              if (!employeeNumber || employeeNumber < 1) return;
              const employeeIndex = employeeNumber - 1;
              if (employeeIndex < 0 || employeeIndex >= pmTotals.length) return;
              pmTotals[employeeIndex] += pmDemand;
            });
          });

          const personalkosten = companyEmployees.reduce((sum, employee, index) => {
            const annualSalary = parseNumber(employee.annualSalary);
            return sum + (pmTotals[index] || 0) * (annualSalary / 12);
          }, 0);
          const zuschlagInput = parseNumber(companyData[companyIndex]?.zuschlagsfaktorPercent);
          const maximalbetrag = parseNumber(companyData[companyIndex]?.maximalbetrag);
          const projektsummeRoh = personalkosten * (1 + zuschlagInput / 100);
          const projektsummeFinal = Math.min(projektsummeRoh, maximalbetrag);
          const realerZuschlagsfaktor =
            personalkosten > 0 ? ((projektsummeFinal / personalkosten) - 1) * 100 : 0;
          const z = Math.min(realerZuschlagsfaktor, zuschlagInput);
          const utilization = maximalbetrag > 0 ? projektsummeFinal / maximalbetrag : 0;

          return {
            z,
            utilization,
            personalkosten,
          };
        };

        const buildPmIncreaseCandidate = (companyIndex, factor, baseWorkPackages) => {
          let changedCells = 0;
          const nextWorkPackages = baseWorkPackages.map((wp) => ({
            ...wp,
            pm: [...wp.pm],
            sub: wp.sub.map((sub) => {
              const nextSub = {
                ...sub,
                pm: [...sub.pm],
              };
              const oldPm = normalizePmValue(sub.pm?.[companyIndex]);
              if (oldPm > 0) {
                const raw = oldPm * (1 + factor);
                const floored = Math.floor(raw / 0.5) * 0.5;
                const newPm = Math.max(floored, oldPm);
                if (newPm > oldPm + 1e-9) {
                  nextSub.pm[companyIndex] = roundToTwo(newPm);
                  changedCells += 1;
                }
              }
              return nextSub;
            }),
          }));
          return { nextWorkPackages, changedCells };
        };

        const isBetterPmCandidate = (candidate, best) => {
          const tolerance = 1e-9;
          const candidateDistance = Math.abs(candidate.metrics.z - 100);
          const bestDistance = Math.abs(best.metrics.z - 100);
          if (candidateDistance < bestDistance - tolerance) return true;
          if (candidateDistance > bestDistance + tolerance) return false;

          const candidateAtOrBelow = candidate.metrics.z <= 100 + tolerance;
          const bestAtOrBelow = best.metrics.z <= 100 + tolerance;
          if (candidateAtOrBelow && !bestAtOrBelow) return true;
          if (!candidateAtOrBelow && bestAtOrBelow) return false;

          if (candidate.metrics.utilization > best.metrics.utilization + tolerance) return true;
          if (candidate.metrics.utilization < best.metrics.utilization - tolerance) return false;

          if (candidate.metrics.personalkosten > best.metrics.personalkosten + tolerance) return true;
          if (candidate.metrics.personalkosten < best.metrics.personalkosten - tolerance) return false;

          return candidate.factor < best.factor;
        };

          let bestCandidate = {

            workPackages: sourceWorkPackages,
            metrics: calculateCompanyFundingMetrics(companyIndex, sourceWorkPackages),
          };

          for (
            let factorPercent = factorStepPercent;
            factorPercent <= maxFactorPercent;
            factorPercent += factorStepPercent
          ) {
            const factor = factorPercent / 100;
            const candidateState = buildPmIncreaseCandidate(companyIndex, factor, sourceWorkPackages);
            if (candidateState.changedCells === 0) {
              continue;
            }
            const candidate = {
              factor,
              workPackages: candidateState.nextWorkPackages,
              metrics: calculateCompanyFundingMetrics(
                companyIndex,
                candidateState.nextWorkPackages
              ),
            };
            if (isBetterPmCandidate(candidate, bestCandidate)) {
              bestCandidate = candidate;

          }
          return bestCandidate.workPackages;

                id: row.id,
                number: row.number,
                title: row.title,
                start: formatDisplayDate(entry.start || "–", "start"),
                end: formatDisplayDate(entry.ende || "–", "end"),
                employeeNumber: entry.mitarbeiterNummer || "–",
                pm: normalizePmValue(row.pmByCompany?.[companyIndex]),
                sortIndex: getSortIndex(entry.start),
              };
            })
            .sort((a, b) => (a.sortIndex - b.sortIndex) || `${a.number}`.localeCompare(`${b.number}`, "de"))
            .map(({ sortIndex, ...row }) => row);

          const totalPm = workPackageRows.reduce((sum, row) => sum + (row.pm > 0 ? row.pm : 0), 0);
          const pmByYear = projectState.employeePmByCompany[companyIndex]?.byYear || [];
          const fundingTotals = projectState.fundingResultsByCompany[companyIndex] || {};
          const annualFunding = fundingTotals.annualFunding || {};
          const yearlyFundingRows = projectState.projectYears.map((year) => ({
            year,
            foerderung: annualFunding[year] || 0,
          }));
          if (yearlyFundingRows.length) {
            const sumFunding = yearlyFundingRows.reduce((sum, row) => sum + row.foerderung, 0);
            const targetFunding = fundingTotals.foerdersumme || 0;
            const diff = targetFunding - sumFunding;
            yearlyFundingRows[yearlyFundingRows.length - 1].foerderung += diff;
          }

          const employeeYearRows = companyEmployees.flatMap((employee, employeeIndex) => {
            const annualSalary = parseNumber(employee.annualSalary);
            return projectState.projectYears.map((year) => {
              const pm = pmByYear[employeeIndex]?.[year] || 0;
              return {
                employeeNumber: employee.number || employeeIndex + 1,
                name: employee.name || `Mitarbeiter ${employeeIndex + 1}`,
                year,
                pm,
                cost: pm * (annualSalary / 12),
              };
            });
          });

          return {
            companyIndex,
            projectName: projectState.currentProjectName || "Projekt",
            companyName,
            generatedAt: new Date(),
            color: getCompanyColorHex(companyIndex),
            workPackages: workPackageRows,
            totalPM: totalPm,
            employees: companyEmployees.map((employee, employeeIndex) => ({
              number: employee.number || employeeIndex + 1,
              name: employee.name || `Mitarbeiter ${employeeIndex + 1}`,
              years: projectState.projectYears.reduce((acc, year) => {
                const pm = pmByYear[employeeIndex]?.[year] || 0;
                const annualSalary = parseNumber(employee.annualSalary);
                acc[year] = { pm, cost: pm * (annualSalary / 12) };
                return acc;
              }, {}),

            projectYears: projectState.projectYears,
            employeeYearRows,
            yearlyFundingRows,
            totalFunding: fundingTotals.foerdersumme || 0,

        const fullscreenCompanyData = useMemo(() => {

            employeesByCompany,
            filteredWorkPackageRowsByCompany,
            companyData,

            projectYears,
            fundingResultsByCompany,

          const csv = rows

                              </tr>
                            ))}
                            {!fullscreenCompanyData.employees.length ? (
                              <tr>
                                <td colSpan={3} className="px-3 py-3 text-center text-slate-500">Keine Mitarbeitenden vorhanden.</td>
                              </tr>
                            ) : null}
                          </tbody>
                        </table>
                      </div>
                    </section>

                    <section className="rounded-lg border border-slate-200">
                      <div className="border-b border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-800">Beantragter Zuschuss pro Jahr</div>
                      <div className="overflow-auto">
                        <table className="min-w-full text-sm">
                          <thead className="bg-slate-50 text-left text-xs font-semibold uppercase text-slate-500">
                            <tr>
                              <th className="px-3 py-2">Jahr</th>
                              <th className="px-3 py-2 text-right">Beantragter Zuschuss</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {fullscreenCompanyData.yearlyFundingRows.map((row) => (
                              <tr key={`fs-funding-${row.year}`}>
                                <td className="px-3 py-2 font-semibold text-slate-700">{row.year}</td>
                                <td className="px-3 py-2 text-right font-semibold text-slate-800">{formatCurrency(row.foerderung)}</td>
                              </tr>
                            ))}
                            <tr className="bg-slate-50">
                              <td className="px-3 py-2 font-semibold text-slate-800">Summe beantragter Zuschuss</td>
                              <td className="px-3 py-2 text-right font-semibold text-slate-900">{formatCurrency(fullscreenCompanyData.totalFunding)}</td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </section>
                  </div>
                </div>
              </div>
            ) : null}

            {newProjectModalOpen ? (
              <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-950/40 px-4">
                <div className="w-full max-w-md rounded-xl border border-slate-200 bg-white p-5 shadow-2xl">
                  <h3 className="text-lg font-semibold text-slate-900">Neues Projekt anlegen</h3>
                  <p className="mt-1 text-sm text-slate-600">
                    Bitte geben Sie einen eindeutigen Projektnamen ein.
                  </p>
                  <input
                    type="text"
                    value={newProjectName}
                    onChange={(event) => {
                      setNewProjectName(event.target.value);
                      setProjectError("");
                    }}
                    placeholder="Projektname"
                    className="ca-focus mt-4 h-10 w-full rounded-md border border-slate-300 px-3 text-sm"
                  />
                  {projectError ? (
                    <div className="mt-2 text-sm font-medium text-rose-600">{projectError}</div>
                  ) : null}
                  <div className="mt-5 flex justify-end gap-2">
                    <button
                      type="button"
                      onClick={() => {
                        setNewProjectModalOpen(false);
                        setNewProjectName("");
                        setProjectError("");
                      }}
                      className="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700"
                    >
                      Abbrechen
                    </button>
                    <button
                      type="button"
                      onClick={createNewProject}
                      className="ca-primary-btn rounded-md px-3 py-2 text-sm font-semibold"
                    >
                      Projekt erstellen
                    </button>
                  </div>
                </div>
              </div>
            ) : null}

            {deleteProjectConfirmName ? (
              <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-950/40 px-4">
                <div className="w-full max-w-md rounded-xl border border-slate-200 bg-white p-5 shadow-2xl">
                  <h3 className="text-lg font-semibold text-slate-900">Projekt löschen</h3>
                  <p className="mt-2 text-sm text-slate-700">
                    Möchtest du das Projekt wirklich löschen? Dieser Vorgang kann nicht rückgängig gemacht werden.
                  </p>
                  <div className="mt-5 flex justify-end gap-2">
                    <button
                      type="button"
                      onClick={() => setDeleteProjectConfirmName("")}
                      className="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700"
                    >
                      Abbrechen
                    </button>
                    <button
                      type="button"
                      onClick={() => {
                        deleteProjectByName(deleteProjectConfirmName);
                        setDeleteProjectConfirmName("");
                      }}
                      className="rounded-md border border-rose-700 bg-rose-700 px-3 py-2 text-sm font-semibold text-white"
                    >
                      Löschen
                    </button>
                  </div>
                </div>
              </div>
            ) : null}

            {loadProjectModalOpen ? (
              <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-950/40 px-4">
                <div className="w-full max-w-2xl rounded-xl border border-slate-200 bg-white p-5 shadow-2xl">
                  <h3 className="text-lg font-semibold text-slate-900">Projekt laden</h3>
                  <input
                    type="text"
                    value={projectSearchTerm}
                    onChange={(event) => setProjectSearchTerm(event.target.value)}
                    placeholder="Projektname suchen"
                    className="ca-focus mt-4 h-10 w-full rounded-md border border-slate-300 px-3 text-sm"
                  />
                  <div className="mt-4 max-h-[360px] overflow-auto rounded-md border border-slate-200">
                    {filteredProjectRecords.length ? (
                      <table className="min-w-full text-sm">
                        <thead className="bg-slate-50 text-left text-slate-600">
                          <tr>
                            <th className="px-3 py-2">Projektname</th>
                            <th className="px-3 py-2">Zuletzt bearbeitet</th>
                            <th className="px-3 py-2">Aktionen</th>
                          </tr>
                        </thead>
                        <tbody>
                          {filteredProjectRecords.map((project) => (
                            <tr key={project.name} className="border-t border-slate-100">
                              <td className="px-3 py-2 font-medium text-slate-800">{project.name}</td>
                              <td className="px-3 py-2 text-slate-600">{formatDateTimeDe(project.lastModified)}</td>
                              <td className="px-3 py-2">
                                <div className="flex items-center gap-2">
                                  <button
                                    type="button"
                                    onClick={() => handleProjectLoad(project.name)}
                                    className="rounded border border-slate-300 px-2 py-1 text-xs font-semibold text-slate-700"
                                  >
                                    Laden
                                  </button>
                                  <button
                                    type="button"
                                    onClick={() => setDeleteProjectConfirmName(project.name)}
                                    className="rounded border border-rose-200 px-2 py-1 text-xs font-semibold text-rose-700"
                                  >
                                    Löschen
                                  </button>
                                </div>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    ) : (
                      <div className="px-3 py-4 text-sm text-slate-500">Keine Projekte gefunden</div>
                    )}
                  </div>
                  <div className="mt-5 flex justify-end gap-2">
                    <button
                      type="button"
                      onClick={() => {
                        setLoadProjectModalOpen(false);
                        setProjectSearchTerm("");
                      }}
                      className="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700"
                    >
                      Schließen
                    </button>
                  </div>
                </div>
              </div>
            ) : null}

            {projectCreationPromptOpen ? (
              <div className="fixed inset-0 z-[65] flex items-center justify-center bg-slate-950/40 px-4">
                <div className="w-full max-w-md rounded-xl border border-slate-200 bg-white p-5 shadow-2xl">
                  <h3 className="text-lg font-semibold text-slate-900">Kein aktives Projekt</h3>
                  <p className="mt-2 text-sm text-slate-700">
                    Es ist aktuell kein Projekt geöffnet. Möchten Sie ein neues Projekt anlegen?
                  </p>
                  <div className="mt-5 flex justify-end gap-2">
                    <button
                      type="button"
                      onClick={() => {
                        setProjectCreationPromptOpen(false);
                        pendingActionAfterProjectCreationRef.current = null;
                        setHasDeclinedProjectCreationForCurrentSession(true);
                      }}
                      className="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700"
                    >
                      Nein
                    </button>
                    <button
                      type="button"
                      onClick={() => {
                        setProjectCreationPromptOpen(false);
                        setProjectError("");
                        setNewProjectName("");
                        setNewProjectModalOpen(true);
                      }}
                      className="ca-primary-btn rounded-md px-3 py-2 text-sm font-semibold"
                    >
                      Ja
                    </button>
                  </div>
                </div>
              </div>
            ) : null}

            {workplanImportModalOpen ? (
              <div className="fixed inset-0 z-[65] flex items-center justify-center bg-slate-950/40 px-4">
                <div className="w-full max-w-4xl rounded-xl border border-slate-200 bg-white p-5 shadow-2xl">
                  <h3 className="text-lg font-semibold text-slate-900">Arbeitsplan importieren</h3>
                  <div className="mt-3 max-h-[300px] overflow-auto rounded-md border border-slate-200 bg-slate-50 p-3 text-sm text-slate-700">
                    <p className="whitespace-pre-wrap leading-relaxed">{importInstructionText}</p>
                  </div>
                  <div className="mt-3">
                    <button
                      type="button"
                      onClick={openInstructionModal}
                      className="rounded-md border border-slate-300 px-3 py-2 text-left text-sm font-semibold text-slate-700"
                    >
                      Anleitung bearbeiten
                    </button>
                  </div>
                  <div className="mt-4">
                    <label className="text-sm font-semibold text-slate-800">
                      JSON-Daten einfügen
                    </label>
                    <textarea
                      value={workplanImportText}
                      onChange={(event) => setWorkplanImportText(event.target.value)}
                      placeholder="Fügen Sie hier den JSON-Text ein."
                      className="mt-2 h-56 w-full rounded-md border border-slate-300 px-3 py-2 font-mono text-sm leading-relaxed focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500"
                    />
                  </div>
                  {workplanImportError ? (
                    <div className="mt-4 rounded-md border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-800">
                      {workplanImportError}
                    </div>
                  ) : null}
                  <div className="mt-5 flex justify-end gap-2">
                    <button
                      type="button"
                      onClick={handleWorkplanTextImport}
                      disabled={!workplanImportText.trim()}
                      className="rounded-md border border-[var(--ca-green-border)] bg-[var(--ca-green)] px-3 py-2 text-sm font-semibold text-white disabled:cursor-not-allowed disabled:border-slate-200 disabled:bg-slate-300"
                    >
                      Import starten
                    </button>
                    <button
                      type="button"
                      onClick={() => {
                        setWorkplanImportModalOpen(false);
                        setWorkplanImportError("");
                        setWorkplanImportText("");
                      }}
                      className="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700"
                    >
                      Schließen
                    </button>
                  </div>
                </div>
              </div>
            ) : null}

            {workplanInstructionModalOpen ? (
              <div className="fixed inset-0 z-[66] flex items-center justify-center bg-slate-950/40 px-4">
                <div className="w-full max-w-3xl rounded-xl border border-slate-200 bg-white p-5 shadow-2xl">
                  <h3 className="text-lg font-semibold text-slate-900">Anleitung</h3>
                  <textarea
                    value={importInstructionDraft}
                    onChange={(event) => setImportInstructionDraft(event.target.value)}
                    className="mt-3 h-[520px] w-full rounded-md border border-slate-300 px-3 py-2 text-sm leading-relaxed focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500"
                  />
                  <div className="mt-4 flex flex-wrap justify-end gap-2">
                    <button
                      type="button"
                      onClick={saveInstructionText}
                      className="rounded-md border border-[var(--ca-green-border)] bg-[var(--ca-green)] px-3 py-2 text-sm font-semibold text-white"
                    >
                      Speichern
                    </button>
                    <button
                      type="button"
                      onClick={() => {
                        setImportInstructionDraft(importInstructionText);
                        setWorkplanInstructionModalOpen(false);
                      }}
                      className="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700"
                    >
                      Schließen
                    </button>
                  </div>
                </div>
              </div>
            ) : null}

            {workplanImportConfirmOpen ? (
              <div className="fixed inset-0 z-[67] flex items-center justify-center bg-slate-950/40 px-4">
                <div className="w-full max-w-lg rounded-xl border border-slate-200 bg-white p-5 shadow-2xl">
                  <h3 className="text-lg font-semibold text-slate-900">Import bestätigen</h3>
                  <p className="mt-2 text-sm text-slate-700">
                    Der Import ersetzt die aktuelle Arbeitsplanstruktur und die PM-Zuordnungen. Möchten Sie fortfahren?
                  </p>
                  <div className="mt-5 flex justify-end gap-2">
                    <button
                      type="button"
                      onClick={confirmWorkplanImport}
                      className="rounded-md border border-[var(--ca-green-border)] bg-[var(--ca-green)] px-3 py-2 text-sm font-semibold text-white"
                    >
                      Importieren
                    </button>
                    <button
                      type="button"
                      onClick={() => {
                        setWorkplanImportConfirmOpen(false);
                        setPendingImportedWorkplan(null);
                      }}
                      className="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700"
                    >
                      Abbrechen
                    </button>
                  </div>
                </div>
              </div>
            ) : null}

            {databaseManagementModalOpen ? (
              <div className="fixed inset-0 z-[70] flex items-center justify-center bg-slate-950/40 px-4">
                <div className="w-full max-w-lg rounded-xl border border-slate-200 bg-white p-5 shadow-2xl">
                  <h3 className="text-lg font-semibold text-slate-900">Datenbankmanagement</h3>
                  <div className="mt-4 space-y-4">
                    <div className="rounded-lg border border-slate-200 p-3">
                      <h4 className="text-sm font-semibold text-slate-800">Backup</h4>
                      <button
                        type="button"
                        onClick={downloadProjectDatabaseBackup}
                        className="mt-2 rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700"
                      >
                        Projektdatenbank herunterladen
                      </button>
                    </div>
                    <div className="rounded-lg border border-slate-200 p-3">
                      <h4 className="text-sm font-semibold text-slate-800">Import</h4>
                      <input
                        ref={projectDbImportInputRef}
                        type="file"
                        accept="application/json,.json"
                        onChange={handleProjectDatabaseImportFile}
                        className="hidden"
                      />
                      <button
                        type="button"
                        onClick={() => projectDbImportInputRef.current?.click()}
                        className="mt-2 rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700"
                      >
                        Projektdatenbank importieren
                      </button>
                    </div>
                  </div>
                  {databaseManagementMessage.text ? (
                    <div className={`mt-4 text-sm font-medium ${databaseManagementMessage.type === "error" ? "text-rose-600" : "text-emerald-700"}`}>
                      {databaseManagementMessage.text}
                    </div>
                  ) : null}
                  <div className="mt-5 flex justify-end">
                    <button
                      type="button"
                      onClick={() => setDatabaseManagementModalOpen(false)}
                      className="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700"
                    >
                      Schließen
                    </button>
                  </div>
                </div>
              </div>
            ) : null}

            {importModeDialogState.open ? (
              <div className="fixed inset-0 z-[80] flex items-center justify-center bg-slate-950/40 px-4">
                <div className="w-full max-w-lg rounded-xl border border-slate-200 bg-white p-5 shadow-2xl">
                  <h3 className="text-lg font-semibold text-slate-900">Import bestätigen</h3>
                  <p className="mt-2 text-sm text-slate-700">
                    Bitte wählen Sie, wie die Projekte aus dem Backup importiert werden sollen.
                  </p>
                  <div className="mt-4 flex flex-col gap-2">
                    <button
                      type="button"
                      onClick={() => confirmProjectDatabaseImport("replace")}
                      className="rounded-md border border-rose-300 bg-rose-50 px-3 py-2 text-sm font-semibold text-rose-700"
                    >
                      Bestehende Projekte ersetzen
                    </button>
                    <button
                      type="button"
                      onClick={() => confirmProjectDatabaseImport("merge")}
                      className="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700"
                    >
                      Mit bestehenden Projekten zusammenführen
                    </button>
                  </div>
                  <div className="mt-5 flex justify-end">
                    <button
                      type="button"
                      onClick={() => setImportModeDialogState({ open: false, backup: null })}
                      className="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700"
                    >
                      Abbrechen
                    </button>
                  </div>
                </div>
              </div>
            ) : null}
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
    </script>
  </body>
</html>
